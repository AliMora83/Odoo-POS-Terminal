name: Generate PROJECT-SYNC.json

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-project-sync:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate PROJECT-SYNC.json
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          TODAY=$(date -u '+%Y-%m-%d')
          ACTOR="${{ github.actor }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          VERSION=$(grep -oP 'Version: \K[0-9]+\.[0-9]+\.[0-9]+' docs/Master.md 2>/dev/null || echo "1.0.2")

          cat > PROJECT-SYNC.json << ENDJSON
          {
            "project": "Odoo POS Terminal",
            "repo": "AliMora83/Odoo-POS-Terminal",
            "branch": "main",
            "stack": ["ESP32", "FreeRTOS", "FastAPI", "Antigravity", "Odoo JSON-RPC", "Python", "EasyEDA", "PCBWay PCBA"],
            "status": "In Progress",
            "priority": 1,
            "priority_label": "🔴 Priority 1 — Ship Now",
            "progress_percent": 20,
            "progress_label": "Hardware drivers validated · Odoo integration starting",
            "current_phase": "Phase 2 — Odoo Integration",
            "next_step": "Build Antigravity endpoint POST /terminal/order → simulate ESP32 with Python/Postman → confirm POS order in Odoo",
            "blocker": "Payment acquiring entity / PSP licence unresolved",
            "live_url": "https://namka.cloud",
            "deploy_target": "Hostinger VPS (Antigravity FastAPI) · Odoo.sh (POS + Accounting) · PCBWay (PCBA)",
            "agents": ["Claude", "AG", "Comet"],
            "macp_version": "2.0",
            "version": "$VERSION",
            "last_push": {
              "timestamp": "$TIMESTAMP",
              "actor": "$ACTOR",
              "commit_message": "$COMMIT_MSG",
              "sha": "$SHORT_SHA"
            },
            "last_updated": "$TODAY"
          }
          ENDJSON

          sed -i 's/^          //' PROJECT-SYNC.json
          echo "PROJECT-SYNC.json generated."

      - name: Commit PROJECT-SYNC.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet PROJECT-SYNC.json || (
            git add PROJECT-SYNC.json &&
            git commit -m "chore: update PROJECT-SYNC.json [skip ci]" &&
            git push
          )
